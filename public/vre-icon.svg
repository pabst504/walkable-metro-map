<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20">
  <!-- Red diamond -->
  <polygon points="10,1 19,10 10,19 1,10" fill="#EE3E42"/>
  <!-- White oval -->
  <ellipse cx="10" cy="10" rx="6" ry="4" fill="white"/>
  <!-- VRE text -->
  <text x="10" y="10" text-anchor="middle" dominant-baseline="central"
        font-family="Arial, sans-serif" font-size="4.5" font-weight="700" fill="#1a1a1a">VRE</text>
  <!-- Diamond border -->
  <polygon points="10,1 19,10 10,19 1,10" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.6"/>
</svg>
