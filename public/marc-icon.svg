<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20">
  <defs>
    <clipPath id="marc-clip">
      <rect x="0" y="0" width="20" height="20" rx="4"/>
    </clipPath>
  </defs>
  <!-- Orange left half -->
  <rect x="0" y="0" width="10" height="20" fill="#F7941D" clip-path="url(#marc-clip)"/>
  <!-- Blue right half -->
  <rect x="10" y="0" width="10" height="20" fill="#003DA5" clip-path="url(#marc-clip)"/>
  <!-- Rounded border -->
  <rect x="0" y="0" width="20" height="20" rx="4" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6"/>
</svg>
